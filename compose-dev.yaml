services:
  jekyll:
    image: ruby:3.2-slim
    container_name: mateusmota-blog-dev
    user: root 
    command: >
      sh -c "apt-get update && 
             apt-get install -y build-essential git &&
             gem install bundler jekyll && 
             bundle install && 
             bundle exec jekyll serve --host 0.0.0.0 --port 4000 --livereload --force_polling --future --drafts"
    ports:
      - "4000:4000"
      - "35729:35729"
    volumes:
      - .:/srv/jekyll
    working_dir: /srv/jekyll
    environment:
      - JEKYLL_ENV=development
    init: true